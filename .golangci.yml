version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

  settings:
    govet:
      disable:
        - fieldalignment
        - shadow
    misspell:
      locale: US
